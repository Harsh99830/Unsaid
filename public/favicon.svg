<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="192" height="192" fill="#f8f6f5" rx="32" ry="32"/>
  
  <!-- Muted Speech Bubble -->
  <g transform="translate(96, 96)">
    <!-- Main speech bubble shape -->
    <path d="M -32 -14 
             C -32 -30, -24 -38, -8 -38
             L 22 -38
             C 38 -38, 46 -30, 46 -14
             L 46 7
             C 46 23, 38 31, 22 31
             L 7 31
             C 4 31, 0 33, -3 35
             L -10 39
             C -14 41, -16 39, -15 35
             L -13 28
             C -30 27, -32 13, -32 -14
             Z" 
          fill="#6b7280" 
          rx="4" ry="4"/>
    
    <!-- Muted indicator (simple lines) -->
    <g transform="translate(0, -3)">
      <!-- Top line -->
      <rect x="-14" y="-7" width="28" height="2" fill="#f8f6f5" rx="1" ry="1"/>
      <!-- Middle line -->
      <rect x="-10" y="-2" width="20" height="2" fill="#f8f6f5" rx="1" ry="1"/>
      <!-- Bottom line -->
      <rect x="-7" y="3" width="14" height="2" fill="#f8f6f5" rx="1" ry="1"/>
    </g>
  </g>
</svg>
